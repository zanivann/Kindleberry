name: Docker Publish Kindleberry

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ] # Gatilho para tags de versão
  workflow_dispatch: 

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Extrai metadados (tags) de forma inteligente
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repo Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

      - name: Build and push SERVER
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          # Agora ele usa tanto 'latest' quanto a versão da tag (ex: 2.0.1)
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server:latest
            ${{ github.ref_type == 'tag' && format('{0}/{1}-server:{2}', env.REGISTRY, env.IMAGE_NAME, github.ref_name) || '' }}
          platforms: linux/arm64

      - name: Build and push AGENT
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-agent:latest
            ${{ github.ref_type == 'tag' && format('{0}/{1}-agent:{2}', env.REGISTRY, env.IMAGE_NAME, github.ref_name) || '' }}
          platforms: linux/arm64