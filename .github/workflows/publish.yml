name: Docker Publish Kindleberry

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch: 

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Alterado para permitir criação de releases
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- ETAPA NOVA: EMPACOTAR O KINDLEBERRY PURO ---
      - name: Zip Kindleberry Files
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          zip -r kindleberry_puro_${{ github.ref_name }}.zip kindleberry/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kindleberry_puro_${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      # --- LOGICA DOCKER (MANTIDA) ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repo Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

      - name: Build and push SERVER
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server:latest
            ${{ github.ref_type == 'tag' && format('{0}/{1}-server:{2}', env.REGISTRY, env.IMAGE_NAME, github.ref_name) || '' }}
          platforms: linux/arm64

      - name: Build and push AGENT
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-agent:latest
            ${{ github.ref_type == 'tag' && format('{0}/{1}-agent:{2}', env.REGISTRY, env.IMAGE_NAME, github.ref_name) || '' }}
          platforms: linux/arm64