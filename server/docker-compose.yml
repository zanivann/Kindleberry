version: "3.8"
services:
  kindleberry:
    image: ghcr.io/zanivann/kindleberry-server:latest
    container_name: kindleberry
    restart: unless-stopped
    privileged: true
    networks:
      - proxy_network
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/gpiochip0:/dev/gpiochip0"
      - "/dev/gpiochip4:/dev/gpiochip4"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /sys:/sys:ro
      # Mapeamento vital para o sensor DS18B20
      - /sys/bus/w1/devices:/sys/bus/w1/devices:ro
      - /DATA/AppData/kindleberry/server:/app
      - /DATA/AppData/kindleberry/data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kindleberry.rule=Host(`kindle.zanivann.com.br`)"
      - "traefik.http.routers.kindleberry.entrypoints=websecure"
      - "traefik.http.routers.kindleberry.tls=true"
      - "traefik.http.routers.kindleberry.tls.certresolver=myresolver"
      - "traefik.http.services.kindleberry.loadbalancer.server.port=5000"

networks:
  proxy_network:
    external: true